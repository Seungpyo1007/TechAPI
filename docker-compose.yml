services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: techapi
      POSTGRES_PASSWORD: techapi
      POSTGRES_DB: techapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techapi"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://techapi:techapi@db:5432/techapi
      API_ENV: development
    ports:
      - "8000:8000"
    # Seed the database, then serve. Idempotent: re-running skips existing rows.
    command: >
      sh -c "python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
